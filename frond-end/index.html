<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAGA - Inicio de Sesión</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/login.css" />
    <style>
      /* Quick integration of toast styles for login page */
      .toast-container { position: fixed; top: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
      .toast { min-width: 280px; padding: 12px 20px; border-radius: 10px; background: rgba(255,255,255,0.95); backdrop-filter: blur(5px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 10px; font-family: 'Inter', sans-serif; font-size: 13px; animation: slideIn 0.3s ease; pointer-events: auto; }
      @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
      .toast-success { border-left: 5px solid #10b981; }
      .toast-error { border-left: 5px solid #ef4444; }
    </style>
  </head>
  <body>
    <div id="toast-container" class="toast-container"></div>
    <div class="Formulario">  
      <img src="./assets/logo.png" alt="SAGA Logo" class="logo" />
      <!-- <i class="fa-solid fa-arrow-right-to-bracket"></i> -->
      <div class="formulario-content">
        <h1>Inicio de sesión</h1>
        <form method="post">
          <div class="username">
            <input id="username" type="text" required />
            <label>Usuario</label>
          </div>
          <div class="contraseña">
            <input id="password" type="password" required />
            <label>Contraseña</label>
          </div>
          <input type="submit" value="Iniciar" />
        </form>
      </div>
    </div>

    <script src="./js/config.js"></script>
    <script src="./js/login.js"></script>
    <script
      src="https://kit.fontawesome.com/569b772610.js"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
