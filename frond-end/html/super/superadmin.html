<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGA - Superadmin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/styles.css">
    <link rel="stylesheet" href="../../css/superadmin.css">
    <link rel="stylesheet" href="../../css/profile.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="../../js/config.js"></script>
</head>
<body class="bg-main">
    <!-- Sidebar Navigation -->
    <!-- App Header (Top Bar) -->
    <header class="app-header">
        <div class="header-left">
            <a href="../../index.html"><img src="../../assets/logo.png" alt="SAGA Logo" class="app-logo"></a>
            <div class="header-title-box">
                <h1 id="mainHeaderTitle">Panel Maestro</h1>
                <p id="subHeaderStatus" style="font-size:10px; color:#f59e0b;">● Sesión Super-Admin</p>
            </div>
        </div>
        
        <div class="header-right">
            <button class="action-btn" id="themeToggle" title="Cambiar Tema" style="background: var(--bg-main); border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border);">
                <i class="fas fa-moon"></i>
            </button>

            <button class="action-btn" title="Notificaciones" style="background: var(--bg-main); border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border);">
                <i class="fas fa-bell"></i>
            </button>

            <div class="user-profile-pill">
                <div id="userAvatar" class="user-avatar-circle">CA</div>
                <div class="user-details" style="display: flex; flex-direction: column;">
                    <h4 id="nombreUsuario" style="margin:0; font-size:13px;">Cristian Albor</h4>
                    <p id="rolUsuario" style="margin:0; font-size:10px; color:var(--text-muted); text-transform:uppercase;">Super-Admin</p>
                </div>
                <button id="logoutBtn" class="action-btn" title="Cerrar sesión" style="color:var(--text-muted); margin-left: 10px;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Floating Bottom Navigation -->
    <nav class="floating-bottom-nav">
        <a href="#dashboard" class="nav-pill active" title="Dashboard">
            <i class="fas fa-columns"></i>
        </a>
        <a href="#usuarios-gestion" class="nav-pill" title="Gestión de Personal">
            <i class="fas fa-user-shield"></i>
        </a>
    </nav>
    <!-- Main Content -->
    <main class="main-content">
        <!-- Dashboard Section -->
        <section id="dashboard" class="content-section active">
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <span class="stat-label">Usuarios Sistema</span>
                        <h2 id="totalUsersCount">0</h2>
                        <p id="activeUsersTagline">Cargando...</p>
                    </div>
                    <div class="stat-icon" style="background: rgba(99, 102, 241, 0.1); color: #6366f1;">
                        <i class="fas fa-users-cog"></i>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-info">
                        <span class="stat-label">Etiquetas SGA</span>
                        <h2 id="stat-labels-count">1,248</h2>
                        <p style="color: #10b981;">+12% este mes</p>
                    </div>
                    <div class="stat-icon" style="background: rgba(16, 185, 129, 0.1); color: #10b981;">
                        <i class="fas fa-tags"></i>
                    </div>
                </div>

                <div class="stat-card">
                    <div class="stat-info">
                        <span class="stat-label">Archivos FDS</span>
                        <h2 id="stat-sds-count">568</h2>
                        <p style="color: #8b5cf6;">+8% este mes</p>
                    </div>
                    <div class="stat-icon" style="background: rgba(139, 92, 246, 0.1); color: #8b5cf6;">
                        <i class="fas fa-file-medical"></i>
                    </div>
                </div>
            </div>
        </section>

        <!-- Personnel Management Section -->
        <section id="usuarios-gestion" class="content-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="font-size: 20px; font-weight: 700;">Gestión de Personal del Sistema</h2>
                <button class="btn btn-outline" onclick="loadUsersList()">
                    <i class="fas fa-sync-alt"></i> Actualizar
                </button>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 2fr; gap: 30px; align-items: start;">
                <!-- Formulario -->
                <div class="card" style="padding: 30px;">
                    <h3 id="userFormTitle" style="margin-bottom: 24px; font-size: 18px;">Registrar Nuevo Usuario</h3>
                    <form id="formNuevoUsuario">
                        <div class="form-group">
                            <label>IDENTIFICACIÓN / ID</label>
                            <input type="text" id="user-id" class="form-control" placeholder="Ej: 101010" required>
                        </div>
                        <div class="form-group">
                            <label>NOMBRE DE USUARIO (LOGIN)</label>
                            <input type="text" id="user-usu" class="form-control" placeholder="Ej: admin1" required>
                        </div>
                        <div class="form-row" style="display:flex; gap:15px;">
                            <div class="form-group">
                                <label>NOMBRES</label>
                                <input type="text" id="user-nombre" class="form-control" required>
                            </div>
                            <div class="form-group">
                                <label>APELLIDOS</label>
                                <input type="text" id="user-apellido" class="form-control" required>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>CORREO ELECTRÓNICO</label>
                            <input type="email" id="user-correo" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>CONTRASEÑA</label>
                            <input type="password" id="user-contra" class="form-control" placeholder="••••••••">
                        </div>
                        <div class="form-group">
                            <label>ROL DE USUARIO</label>
                            <select id="user-rol" class="form-control" required>
                                <option value="Empleado">Empleado</option>
                                <option value="Administrador">Administrador</option>
                                <option value="Super administrador">Super Administrador</option>
                            </select>
                        </div>
                        <button type="submit" id="userFormSubmitBtn" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 20px; height: 50px;">
                            <i class="fas fa-user-plus"></i> <span id="userFormSubmitText">CREAR USUARIO</span>
                        </button>
                        <button type="button" id="btnCancelEdit" class="btn btn-outline" style="width: 100%; justify-content: center; margin-top: 10px; display: none;" onclick="resetUserForm()">
                            Cancelar Edición
                        </button>
                    </form>
                </div>

                <!-- Tabla -->
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Usuario</th>
                                <th>Rol</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <!-- JS populate -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <!-- Toast Container -->
    <div id="toast-container" style="position: fixed; top: 20px; right: 20px; z-index: 9999;"></div>

    <script src="../../js/script.js"></script>
    <script src="../../js/superadmin.js"></script>
</body>
</html>
</body>
</html>
